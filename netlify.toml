[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

# ─── Standard Functions (chỉ dùng cho /api/models - chạy rất nhanh) ──────────
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@google/genai"]

[functions.models]
  memory = 512

# ─── Edge Function cho /api/chat (không bị giới hạn 26s timeout) ─────────────
[[edge_functions]]
  path = "/api/chat"
  function = "chat"

# ─── Redirects ────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/models"
  to = "/.netlify/functions/models"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
